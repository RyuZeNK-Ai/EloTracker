<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EloTracker</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
input, select { padding:8px; margin:5px; }
button { padding:10px; margin:5px; border:none; border-radius:6px; cursor:pointer; }
.win{background:#22c55e;} .loss{background:#ef4444;} .reset{background:#64748b;}
.green{color:#22c55e;} .yellow{color:#eab308;} .red{color:#ef4444;}
.small{opacity:.7;font-size:12px}
</style>
</head>

<body>

<h1>EloTracker</h1>
<p class="small">Controla tu MMR. Deja de grindear a ciegas.</p>

<div id="setup">
<h2>Setup Inicial</h2>

<select id="rank">
<option>Hierro IV</option><option>Hierro III</option><option>Hierro II</option><option>Hierro I</option>
<option>Bronce IV</option><option>Bronce III</option><option>Bronce II</option><option>Bronce I</option>
<option>Plata IV</option><option>Plata III</option><option>Plata II</option><option>Plata I</option>
<option>Oro IV</option><option>Oro III</option><option>Oro II</option><option>Oro I</option>
<option>Platino IV</option><option>Platino III</option><option>Platino II</option><option>Platino I</option>
<option>Esmeralda IV</option><option>Esmeralda III</option><option>Esmeralda II</option><option>Esmeralda I</option>
<option>Diamante IV</option><option>Diamante III</option><option>Diamante II</option><option>Diamante I</option>
<option>Maestro</option><option>Gran Maestro</option><option>Challenger</option>
</select>

<br>

<input id="lpStart" type="number" placeholder="LP actual"><br>

<input id="lpWin" type="number" placeholder="Ganas">
<input id="lpLoss" type="number" placeholder="Pierdes">

<h3>WR Global</h3>
<input id="baseWins" type="number" placeholder="Wins">
<input id="baseLosses" type="number" placeholder="Losses">

<h3>Campeones</h3>
<div id="champInputs"></div>

<button onclick="saveSetup()">Empezar</button>
</div>

<div id="app" style="display:none">

<h2 id="rankDisplay"></h2>
<h3 id="lpDisplay"></h3>

<h2 id="status"></h2>
<p id="mmr"></p>
<p id="wr"></p>
<p id="baseWR"></p>
<p id="advice"></p>

<button class="reset" onclick="resetAll()">RESET</button>
<button onclick="exportData()">Exportar</button>
<input type="file" onchange="importData(event)">

<hr>

<select id="champSelect"></select>
<input id="lpChange" type="number" placeholder="LP">

<br>

<button class="win" onclick="addGame('W')">WIN</button>
<button class="loss" onclick="addGame('L')">LOSS</button>

<p class="small">Solo se preguntará descenso en División IV</p>

<hr>

<div id="champStats"></div>

</div>

<script>
const ranks = [
"Hierro IV","Hierro III","Hierro II","Hierro I",
"Bronce IV","Bronce III","Bronce II","Bronce I",
"Plata IV","Plata III","Plata II","Plata I",
"Oro IV","Oro III","Oro II","Oro I",
"Platino IV","Platino III","Platino II","Platino I",
"Esmeralda IV","Esmeralda III","Esmeralda II","Esmeralda I",
"Diamante IV","Diamante III","Diamante II","Diamante I",
"Maestro","Gran Maestro","Challenger"
];

let data = JSON.parse(localStorage.getItem("data"));

if (!data) initSetup();
else loadApp();

function isDivisionIV(){
  return ranks[data.rankIndex].includes("IV");
}

function initSetup(){
  let html="";
  for(let i=0;i<5;i++){
    html+=`<input placeholder="Champ">
           <input type="number" placeholder="Wins">
           <input type="number" placeholder="Losses"><br>`;
  }
  champInputs.innerHTML=html;
}

function saveSetup(){
  let champs={};
  let inputs=document.querySelectorAll("#champInputs input");

  for(let i=0;i<inputs.length;i+=3){
    let name=inputs[i].value;
    let w=parseInt(inputs[i+1].value)||0;
    let l=parseInt(inputs[i+2].value)||0;
    if(name) champs[name]={w,l};
  }

  let win=parseInt(lpWin.value)||0;
  let loss=parseInt(lpLoss.value)||0;

  data={
    rankIndex:rank.selectedIndex,
    lp:parseInt(lpStart.value)||0,
    lpWin:win,
    lpLoss:loss,
    baseWins:parseInt(baseWins.value)||0,
    baseLosses:parseInt(baseLosses.value)||0,
    champs,
    games:[],
    mmrValue: win - loss
  };

  save(); loadApp();
}

function loadApp(){
  setup.style.display="none";
  app.style.display="block";
  loadChamps();
  update();
}

function loadChamps(){
  champSelect.innerHTML="";
  for(let c in data.champs){
    champSelect.innerHTML+=`<option>${c}</option>`;
  }
}

function addGame(result){
  let champ=champSelect.value;
  let lp=parseInt(lpChange.value);
  if(isNaN(lp)) return alert("LP requerido");

  if(result==="W"){
    data.lp+=lp;
    data.champs[champ].w++;
    data.baseWins++;
  }else{
    data.lp-=lp;

    if(data.lp<0){

      if(isDivisionIV()){
        let d=prompt("¿Bajaste? (si/no)");

        if(d==="si"){
          let newLP=prompt("LP final:");
          if(data.rankIndex>0){
            data.rankIndex--;
            data.lp=parseInt(newLP)||0;
          }
        }else data.lp=0;

      }else{
        data.rankIndex--;
        data.lp=75;
      }
    }

    data.champs[champ].l++;
    data.baseLosses++;
  }

  if(data.lp>=100){
    if(data.rankIndex<ranks.length-1){
      data.lp-=100;
      data.rankIndex++;
    }
  }

  data.games.push({result,lp,champ});
  save(); update();
}

function save(){localStorage.setItem("data",JSON.stringify(data));}
function last(n){return data.games.slice(-n);}

function update(){
  rankDisplay.innerText=ranks[data.rankIndex];
  lpDisplay.innerText="LP: "+data.lp;

  let stats=updateStats();
  updateStatus(stats);
  updateChamps();

  baseWR.innerText=`WR Global: ${getBaseWR()}%`;
}

function getBaseWR(){
  let t=data.baseWins+data.baseLosses;
  return t?(data.baseWins/t*100).toFixed(1):0;
}

function updateStats(){
  let wins=data.games.filter(g=>g.result==="W");
  let losses=data.games.filter(g=>g.result==="L");

  let avgWin=wins.length?wins.reduce((a,b)=>a+b.lp,0)/wins.length:data.lpWin;
  let avgLoss=losses.length?losses.reduce((a,b)=>a+b.lp,0)/losses.length:data.lpLoss;

  let last20=last(20);
  let wr=last20.length?(last20.filter(g=>g.result==="W").length/last20.length)*100:getBaseWR();

  let newMMR=(avgWin-avgLoss)+((wr-50)*0.2);

  let prev=(typeof data.mmrValue==="number")?data.mmrValue:(data.lpWin-data.lpLoss);
  data.mmrValue=prev*0.7+newMMR*0.3;

  mmr.innerText="MMR: "+data.mmrValue.toFixed(2);
  document.getElementById("wr").innerText="WR(20): "+wr.toFixed(1)+"%";

  return{mmr:data.mmrValue,wr};
}

function updateStatus({mmr,wr}){
  let losses=last(5).filter(g=>g.result==="L").length;

  let status="JUGAR",color="green",msg="";

  if(losses>=3 || mmr<-2){
    status="PARAR";color="red";
    msg="Detente. Estás perdiendo MMR.";
  }
  else if(losses===2 || mmr<0){
    status="CUIDADO";color="yellow";
    msg="Cuidado.";
  }
  else{
    if(mmr>2) msg="MMR subiendo. Sigue.";
    else if(wr>55) msg="Vas bien. Sigue.";
    else msg="Estable.";
  }

  status.innerHTML=`<span class="${color}">${status}</span>`;
  advice.innerText=msg;
}

function updateChamps(){
  let html="";
  for(let c in data.champs){
    let w=data.champs[c].w,l=data.champs[c].l;
    let total=w+l;
    let wr=total?(w/total*100).toFixed(1):0;
    html+=`<p>${c}: ${wr}% (${total})</p>`;
  }
  champStats.innerHTML=html;
}

function resetAll(){
  localStorage.removeItem("data");
  location.reload();
}

function exportData(){
  let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="elotracker.json";
  a.click();
}

function importData(e){
  let file=e.target.files[0];
  let reader=new FileReader();
  reader.onload=()=>{
    localStorage.setItem("data",reader.result);
    location.reload();
  };
  reader.readAsText(file);
}
</script>

</body>
</html>
